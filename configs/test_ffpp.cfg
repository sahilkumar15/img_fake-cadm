# configs/caddm_train_ffpp.cfg
#
# Training config for FF++ dataset.
# Mirrors the original caddm_train.cfg exactly — only dataset paths differ.
#
# USAGE:
#   CUDA_VISIBLE_DEVICES=0 python3 train.py --cfg ./configs/caddm_train_ffpp.cfg
#
# For multi-GPU:
#   CUDA_VISIBLE_DEVICES=0,1 python3 train.py --cfg ./configs/caddm_train_ffpp.cfg
#
# Resume from checkpoint:
#   CUDA_VISIBLE_DEVICES=0 python3 train.py \
#       --cfg  ./configs/caddm_train_ffpp.cfg \
#       --ckpt ./checkpoints/ffpp_resnet34/epoch_10.pkl
# ─────────────────────────────────────────────────────────────────────────────

# Face alignment / crop parameters
# These must stay consistent between extraction, training, and testing.
crop_face:
  face_width: 80
  output_size: 224
  scale: 0.9

# Artifact Detection Module anchor configuration.
# Must match the architecture in backbones/adm.py — do not change.
adm_det:
  min_dim: 224
  aspect_ratios: [[1], [1], [1], [1]]
  feature_maps: [7, 5, 3, 1]
  steps: [32, 45, 75, 224]
  min_sizes: [40, 80, 120, 224]
  max_sizes: [80, 120, 160, 224]
  clip: True
  variance: [0.1]
  name: "deepfake"

# Sliding window prior bounding boxes used inside prepare_train_input
# for multi-scale facial swap label assignment.
sliding_win:
  prior_bbox: [[40, 80], [80, 120], [120, 160], [224, 224]]

# MultiBoxLoss hyper-parameters — keep identical to caddm_train.cfg.
det_loss:
  num_classes: 2
  overlap_thresh: 0.9
  prior_for_matching: True
  bkg_label: 0
  neg_mining: True
  neg_pos: 2
  neg_overlap: 0.5
  encode_target: False
  use_gpu: True

# ── Dataset ──────────────────────────────────────────────────────────────────
# img_path  : root folder written by lib/extract_frames_ldm_ff++_train.py
#             dataset.py scans its immediate sub-directories as class folders.
#             The extraction script mirrors FF++'s tree under train_images/,
#             so the top-level dirs will be:
#               original_sequences/   ← real (label 0)
#               manipulated_sequences/ ← fake (label 1)
#             collect_class() sorts them reverse-alphabetically:
#               original_sequences → index 0
#               manipulated_sequences → index 1
#             That maps to label 0 = real, 1 = fake — exactly what the JSON stores.
#
# ld_path   : JSON produced by lib/extract_frames_ldm_ff++_train.py
dataset:
  img_path: "./train_images"
  ld_path:  "./train_images/ldm.json"

# ── Model ─────────────────────────────────────────────────────────────────────
# backbone options: resnet34 | efficientnet-b3 | efficientnet-b4
# resnet34 trains fastest; efficientnet-b4 gives the best published AUC.
model:
  backbone: "resnet34"
  save_path: "./checkpoints/ffpp_resnet34"

# ── Training hyper-parameters ─────────────────────────────────────────────────
train:
  batch_size: 128   # reduce to 64 or 32 if GPU OOM
  epoch_num: 200



# # 1. Extract frames (once)
# python lib/ff++_train.py

# # 2. Train
# CUDA_VISIBLE_DEVICES=0 python3 train.py --cfg ./configs/caddm_train_ffpp.cfg

# # 3. Test
# CUDA_VISIBLE_DEVICES=0 python3 test.py --cfg ./configs/caddm_test_ffpp.cfg
